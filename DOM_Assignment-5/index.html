<!DOCTYPE html>
<html>
<head>
    <title>DOM Assignment 5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>JavaScript DOM Event Listeners</h1>

    <!-- Task 1 -->
    <section>
        <button id="clickBtn">Click Me</button>
    </section>

    <!-- Task 2 -->
    <section>
        <p id="textPara">This is original text.</p>
        <button id="changeTextBtn">Change Text</button>
    </section>

    <!-- Task 3 -->
    <section>
        <button id="bgBtn">Change Background</button>
    </section>

    <!-- Task 4 -->
    <section>
        <input type="text" id="liveInput" placeholder="Start typing here...">
        <p id="liveText"></p>
    </section>

    <!-- Task 5 -->
    <section>
        <div id="hoverBox">Hover Over Me</div>
    </section>

    <!-- Task 6 -->
    <section>
        <button id="doubleBtn">Double Click Me</button>
    </section>

    <script src="script.js"></script>
</body>
</html>
